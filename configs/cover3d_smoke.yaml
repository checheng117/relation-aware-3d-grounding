# COVER-3D Smoke Test Configuration
#
# Minimal configuration for Phase 2 smoke validation.
# NOT for full training - just forward pass validation.
#
# Date: 2026-04-19
# Phase: 2 (Implementation + Smoke Validation)

model:
  name: "cover3d"
  type: "Cover3DModel"

  # Dimensions (matching ReferIt3DNet)
  object_dim: 320
  language_dim: 256
  geometry_dim: 6
  class_dim: 64

  # Dense Relation Module
  relation:
    hidden_dim: 256
    mlp_layers: 2
    dropout: 0.1
    chunk_size: 16  # Memory-safe chunking
    temperature: 1.0
    use_geometry: true
    use_residual: true
    residual_scale: 0.1

  # Soft Anchor Posterior
  anchor:
    hidden_dim: 128
    temperature: 1.0
    min_entropy_threshold: 0.5
    prior_weight: 0.2
    use_class_features: true
    dropout: 0.1

  # Calibrated Fusion Gate
  fusion:
    signal_dim: 4
    hidden_dim: 32
    min_gate: 0.1  # Prevent collapse to base-only
    max_gate: 0.9  # Prevent collapse to relation-only
    init_bias: 0.3  # Favor base slightly at initialization
    dropout: 0.1

  # General
  dropout: 0.1
  emit_diagnostics: true

# Smoke test parameters (minimal)
smoke_test:
  enabled: true
  batch_size: 4
  num_objects: 20  # Small scene for quick test
  device: "cpu"  # CPU-only for smoke test
  num_iterations: 3

  # Input generation
  input_dim: 320
  language_input_dim: 256

  # Validation checks
  checks:
    - import_works
    - forward_pass_works
    - tensor_shapes_correct
    - no_nan_inf
    - memory_safe
    - diagnostics_emitted
    - gate_bounds_correct

# No training parameters (Phase 2 only)
training:
  enabled: false  # NOT for smoke test phase

# No dataset parameters (smoke uses synthetic inputs)
dataset:
  enabled: false

# Output
output:
  log_level: "INFO"
  save_diagnostics: true
  diagnostics_path: "reports/cover3d_phase2_smoke_diagnostics.json"