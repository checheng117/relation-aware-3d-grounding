# Blueprint rerank pass: one JSON with multiple rows (extend experiments as checkpoints exist).
# Optional: coarse_model: coarse_geom when using CoarseGeomAttributeModel checkpoints.
dataset_config: configs/dataset/diagnosis_full_geom.yaml
model_config: configs/model/relation_aware.yaml
coarse_model: attribute_only
split: val
batch_size: 16
device: cuda
margin_thresh: 0.15
parser_mode: structured
# Same cache roots as `train_main` / diagnosis: `.../diagnosis/structured` or `.../diagnosis/heuristic`.
parser_cache_dir: data/parser_cache/diagnosis
coarse_checkpoint: outputs/checkpoints_diagnosis/diag_full_baseline_last.pt
output_json: outputs/metrics/rerank_blueprint_pass.json
reference_metrics:
  diagnosis_entity_rel_structured: outputs/metrics/diagnosis/main_entity_rel_structured.json
  diagnosis_full_rel_structured: outputs/metrics/diagnosis/main_full_rel_structured.json
  diagnosis_full_baseline: outputs/metrics/diagnosis/main_full_baseline.json
experiments:
  - name: full_scene_attribute_only
    type: attribute_full_scene
  - name: full_scene_coarse_topk5_attribute
    type: coarse_topk_attribute
    rerank_k: 5
  - name: full_scene_coarse_topk10_attribute
    type: coarse_topk_attribute
    rerank_k: 10
  - name: full_scene_coarse_topk20_attribute
    type: coarse_topk_attribute
    rerank_k: 20
  - name: full_scene_relation_aware
    type: relation_aware_full_scene
    checkpoint: outputs/checkpoints_diagnosis/diag_full_rel_structured_last.pt
  - name: full_scene_topk10_rerank
    type: two_stage_rerank
    rerank_k: 10
    fine_checkpoint: outputs/checkpoints_rerank/rerank_full_k10_last.pt
  - name: full_scene_topk10_rerank_hardneg
    type: two_stage_rerank
    rerank_k: 10
    fine_checkpoint: outputs/checkpoints_rerank/rerank_full_k10_hardneg_last.pt
  - name: full_scene_topk20_rerank_same_fine_weights
    type: two_stage_rerank
    rerank_k: 20
    fine_checkpoint: outputs/checkpoints_rerank/rerank_full_k10_last.pt
