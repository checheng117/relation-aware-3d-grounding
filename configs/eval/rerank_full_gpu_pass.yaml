# Full GPU pass: baseline vs geom coarse + K-aligned two-stage (writes NEW json; does not touch rerank_blueprint_pass.json).
dataset_config: configs/dataset/diagnosis_full_geom.yaml
model_config: configs/model/relation_aware.yaml
split: val
batch_size: 16
device: cuda
margin_thresh: 0.15
parser_mode: structured
parser_cache_dir: data/parser_cache/diagnosis
coarse_checkpoint: outputs/checkpoints_stage1/coarse_attr_baseline_last.pt
coarse_model: attribute_only
output_json: outputs/metrics/rerank_full_gpu_pass.json
reference_metrics: {}
experiments:
  - name: full_gpu_attr_baseline_full_scene
    type: attribute_full_scene
    coarse_checkpoint: outputs/checkpoints_stage1/coarse_attr_baseline_last.pt
    coarse_model: attribute_only
  - name: full_gpu_geom_recall_full_scene
    type: attribute_full_scene
    coarse_checkpoint: outputs/checkpoints_stage1/coarse_geom_recall_last.pt
    coarse_model: coarse_geom
  - name: full_gpu_attr_baseline_topk5
    type: coarse_topk_attribute
    coarse_checkpoint: outputs/checkpoints_stage1/coarse_attr_baseline_last.pt
    coarse_model: attribute_only
    rerank_k: 5
  - name: full_gpu_attr_baseline_topk10
    type: coarse_topk_attribute
    coarse_checkpoint: outputs/checkpoints_stage1/coarse_attr_baseline_last.pt
    coarse_model: attribute_only
    rerank_k: 10
  - name: full_gpu_attr_baseline_topk20
    type: coarse_topk_attribute
    coarse_checkpoint: outputs/checkpoints_stage1/coarse_attr_baseline_last.pt
    coarse_model: attribute_only
    rerank_k: 20
  - name: full_gpu_geom_recall_topk5
    type: coarse_topk_attribute
    coarse_checkpoint: outputs/checkpoints_stage1/coarse_geom_recall_last.pt
    coarse_model: coarse_geom
    rerank_k: 5
  - name: full_gpu_geom_recall_topk10
    type: coarse_topk_attribute
    coarse_checkpoint: outputs/checkpoints_stage1/coarse_geom_recall_last.pt
    coarse_model: coarse_geom
    rerank_k: 10
  - name: full_gpu_geom_recall_topk20
    type: coarse_topk_attribute
    coarse_checkpoint: outputs/checkpoints_stage1/coarse_geom_recall_last.pt
    coarse_model: coarse_geom
    rerank_k: 20
  - name: full_gpu_two_stage_k5_geom
    type: two_stage_rerank
    coarse_checkpoint: outputs/checkpoints_stage1/coarse_geom_recall_last.pt
    coarse_model: coarse_geom
    fine_checkpoint: outputs/checkpoints_stage1_rerank/rerank_k5_stage1_last.pt
    rerank_k: 5
  - name: full_gpu_two_stage_k10_geom
    type: two_stage_rerank
    coarse_checkpoint: outputs/checkpoints_stage1/coarse_geom_recall_last.pt
    coarse_model: coarse_geom
    fine_checkpoint: outputs/checkpoints_stage1_rerank/rerank_k10_stage1_last.pt
    rerank_k: 10
  - name: full_gpu_two_stage_k20_geom
    type: two_stage_rerank
    coarse_checkpoint: outputs/checkpoints_stage1/coarse_geom_recall_last.pt
    coarse_model: coarse_geom
    fine_checkpoint: outputs/checkpoints_stage1_rerank/rerank_k20_stage1_last.pt
    rerank_k: 20
