  coarse_checkpoint: outputs/checkpoints_stage1_opt/coarse_geom_ce_hardneg_last.pt
  coarse_model: coarse_geom
  rerank_k: 10
- name: opt_promote_0_coarse_geom_ce_hardneg_two_stage_k10
  type: two_stage_rerank
  coarse_checkpoint: outputs/checkpoints_stage1_opt/coarse_geom_ce_hardneg_last.pt
  coarse_model: coarse_geom
  fine_checkpoint: outputs/checkpoints_stage1_rerank_opt/rerank_k10_opt_coarse_geom_ce_hardneg_last.pt
  rerank_k: 10
- name: opt_promote_1_coarse_attr_baseline_fullref_coarse_topk10
  type: coarse_topk_attribute
  coarse_checkpoint: outputs/checkpoints_stage1_opt/coarse_attr_baseline_fullref_last.pt
  coarse_model: attribute_only
  rerank_k: 10
- name: opt_promote_1_coarse_attr_baseline_fullref_two_stage_k10
  type: two_stage_rerank
  coarse_checkpoint: outputs/checkpoints_stage1_opt/coarse_attr_baseline_fullref_last.pt
  coarse_model: attribute_only
  fine_checkpoint: outputs/checkpoints_stage1_rerank_opt/rerank_k10_opt_coarse_attr_baseline_fullref_last.pt
  rerank_k: 10
