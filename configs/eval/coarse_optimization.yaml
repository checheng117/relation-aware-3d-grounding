dataset_config: configs/dataset/diagnosis_full_geom.yaml
model_config: configs/model/relation_aware.yaml
split: val
batch_size: 16
device: cuda
margin_thresh: 0.15
experiments:
  - name: coarse_attr_baseline_fullref
    coarse_model: attribute_only
    checkpoint: outputs/checkpoints_stage1_opt/coarse_attr_baseline_fullref_last.pt
    recipe_tag: attr_baseline_fullref
    geom_encoder: false
    ce_only: false
    load_w: false
    sameclass: false
    hardneg: false
    spatial: false
  - name: coarse_geom_ce_only
    coarse_model: coarse_geom
    checkpoint: outputs/checkpoints_stage1_opt/coarse_geom_ce_only_last.pt
    recipe_tag: geom_ce_only
    geom_encoder: true
    ce_only: true
    load_w: false
    sameclass: false
    hardneg: false
    spatial: false
