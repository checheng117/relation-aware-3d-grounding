# Same as rerank_full_k10.yaml but with same-class hard-negative hinge on rerank logits.
model: relation_aware
dataset_config: configs/dataset/diagnosis_full_geom.yaml
coarse_checkpoint: outputs/checkpoints_diagnosis/diag_full_baseline_last.pt
rerank_k: 10
parser_mode: structured
parser_cache_dir: data/parser_cache/diagnosis
epochs: 8
batch_size: 16
lr: 0.0001
weight_decay: 0.01
seed: 43
num_workers: 2
checkpoint_dir: outputs/checkpoints_rerank
metrics_file: outputs/metrics/rerank_full_k10_hardneg.jsonl
run_name: rerank_full_k10_hardneg
device: cuda
debug_max_batches: null
loss:
  hard_negative:
    enabled: true
    margin: 0.25
    lambda_hinge: 0.5
