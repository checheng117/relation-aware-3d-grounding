model: attribute_only
dataset_config: configs/dataset/referit3d.yaml

# Training parameters
epochs: 5
batch_size: 8
lr: 0.0001
weight_decay: 0.01
seed: 42
device: cpu

# Paths
checkpoint_dir: outputs/checkpoints/attribute_baseline
metrics_file: outputs/metrics/attribute_baseline_metrics.jsonl
eval_split: val

# Debug/testing
debug_max_batches: 10  # For testing purposes