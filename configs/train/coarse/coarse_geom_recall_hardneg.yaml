# Optional ablation: stronger same-class hinge only (geometry + recall losses unchanged).
# Not part of the minimal full-GPU chain; use if you need a third coarse curve.
model: relation_aware
dataset_config: configs/dataset/diagnosis_full_geom.yaml
coarse_model: coarse_geom
train_manifest: data/processed/diagnosis_full_geom/train_manifest.jsonl
val_manifest: data/processed/diagnosis_full_geom/val_manifest.jsonl
checkpoint_dir: outputs/checkpoints_stage1
metrics_file: outputs/metrics/coarse_geom_recall_hardneg.jsonl
run_name: coarse_geom_recall_hardneg
epochs: 5
batch_size: 16
lr: 0.0001
weight_decay: 0.01
seed: 42
num_workers: 2
device: cuda
mode: real
debug_max_batches: null
loss:
  candidate_load_weight:
    enabled: true
  ranking_margin:
    enabled: true
    margin: 0.2
    lambda: 0.2
  spatial_nearby_hinge:
    enabled: true
    margin: 0.2
    lambda: 0.15
    max_neighbors: 4
  hard_negative:
    enabled: true
    margin: 0.3
    lambda_hinge: 0.75
