# Smoke / dev: few batches, 1 epoch (CPU-friendly).
model: relation_aware
dataset_config: configs/dataset/diagnosis_full_geom.yaml
coarse_model: coarse_geom
train_manifest: data/processed/diagnosis_full_geom/train_manifest.jsonl
val_manifest: data/processed/diagnosis_full_geom/val_manifest.jsonl
checkpoint_dir: outputs/checkpoints_stage1
metrics_file: outputs/metrics/coarse_geom_quick.jsonl
run_name: coarse_geom_quick
epochs: 1
batch_size: 8
lr: 0.0001
weight_decay: 0.01
seed: 42
num_workers: 0
device: cpu
mode: real
debug_max_batches: 12
loss:
  ranking_margin:
    enabled: true
    margin: 0.2
    lambda: 0.15
  hard_negative:
    enabled: true
    margin: 0.25
    lambda_hinge: 0.25
