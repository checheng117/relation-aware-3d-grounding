# Protocol Alignment - Smoke Test Configuration
# Quick test to verify training pipeline works

# Dataset
dataset:
  manifest_dir: data/processed
  train_manifest: train_manifest.jsonl
  val_manifest: val_manifest.jsonl
  test_manifest: test_manifest.jsonl
  raw_root: data/raw/referit3d

# Model
model:
  name: referit3dnet
  encoder_type: simple_point
  point_input_dim: 256
  point_hidden_dim: 128
  point_output_dim: 256
  lang_output_dim: 256
  fusion_dim: 512
  dropout: 0.1

# Training
training:
  epochs: 3  # Quick test
  batch_size: 16
  lr: 0.0005
  weight_decay: 0.0
  grad_clip: 1.0
  seed: 42
  warmup_epochs: 1
  warmup_multiplier: 1.0
  scheduler_type: multistep
  scheduler_milestones: [2]
  scheduler_gamma: 0.65
  use_separate_encoder_lr: true
  encoder_lr_factor: 0.1
  gradient_accumulation_steps: 2
  early_stopping_patience: 2

# Evaluation
evaluation:
  batch_size: 32
  compute_acc_at_5: true
  compute_sub_metrics: false

# Checkpointing
checkpoint:
  dir: outputs/protocol_fidelity/smoke_test
  save_best_only: true
  monitor: val_acc

# Logging
logging:
  log_dir: outputs/protocol_fidelity/smoke_test/logs
  log_every_n_steps: 10

# Device
device: cuda

# Debug
debug:
  max_batches: 5  # Quick test